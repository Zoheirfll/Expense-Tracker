<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#102822" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title id="docTitle">المصاريف</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg-page:#0A1A16; --bg-deep:#102822; --bg-card:#1B3A30; --line:rgba(242,236,221,0.12);
  --copper:#C97A4A; --gold:#D4AF6A; --cream:#F2ECDD; --muted:#8FA89C;
  --green:#6FA98A; --red:#E0897A;
}
:root.light{
  --bg-page:#EFE9D8; --bg-deep:#F7F3E6; --bg-card:#FFFFFF; --line:rgba(16,40,34,0.12);
  --copper:#C97A4A; --gold:#B8893F; --cream:#1B2E27; --muted:#7A8C84;
  --green:#3F8A66; --red:#C75C4A;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg-page);}
body{font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif;transition:background .2s;}
.page-bg{background:var(--bg-page);min-height:100vh;display:flex;justify-content:center;}
.app-root{width:100%;max-width:480px;min-height:100vh;background:var(--bg-deep);color:var(--cream);position:relative;padding-bottom:110px;transition:background .2s,color .2s;}
.app-root.rtl{direction:rtl;}
.app-root.ltr{direction:ltr;}
.mono{font-family:'Space Mono','Courier New',monospace;}
.header{padding:22px 18px 6px;display:flex;justify-content:space-between;align-items:flex-start;}
.header h1{margin:0;font-size:26px;font-weight:900;letter-spacing:.2px;}
.header .subtitle{margin:2px 0 0;font-size:12.5px;color:var(--gold);font-weight:500;}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{background:var(--bg-card);border:none;color:var(--cream);width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700;}
.icon-btn:focus-visible{outline:2px solid var(--gold);}
.reset-link{background:none;border:none;color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;padding:4px;font-family:inherit;}
.reset-link:hover{color:var(--copper);}
.tab-row{display:flex;gap:6px;padding:0 18px 10px;}
.tab-btn{flex:1;background:var(--bg-card);border:none;color:var(--muted);border-radius:10px;padding:9px 4px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.tab-btn.active{background:var(--copper);color:#1C1209;}
.stat-row{display:flex;gap:10px;padding:6px 18px 14px;}
.stat-col{flex:1;display:flex;flex-direction:column;}
.stat-chip{background:var(--bg-card);border-radius:12px 12px 0 0;padding:12px 14px 9px;}
.stat-chip .s-label{font-size:11px;color:var(--muted);margin:0 0 2px;}
.stat-chip .s-range{font-size:10px;color:var(--muted);margin:0 0 6px;opacity:.75;}
.stat-chip .s-value{font-size:18px;font-weight:700;margin:0;direction:ltr;text-align:right;}
.app-root.ltr .stat-chip .s-value{text-align:left;}
.stat-chip .s-delta{font-size:10.5px;margin:3px 0 0;direction:ltr;text-align:right;}
.app-root.ltr .stat-chip .s-delta{text-align:left;}
.stat-edge{height:8px;margin-top:-1px;background-image:linear-gradient(45deg,var(--bg-card) 50%,transparent 50%),linear-gradient(-45deg,var(--bg-card) 50%,transparent 50%);background-size:10px 10px;background-position:0 0,0 0;background-repeat:repeat-x;}
.month-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 0 16px;}
.nav-btn{background:var(--bg-card);border:none;color:var(--cream);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-family:inherit;}
.nav-btn:hover:not(:disabled){background:#234d40;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
.month-label{font-weight:700;font-size:15px;min-width:110px;text-align:center;}
.receipt-wrap{padding:0 18px;}
.receipt-card{background:var(--bg-card);border-radius:16px 16px 0 0;padding:22px 20px 18px;}
.receipt-eyebrow{font-size:11.5px;color:var(--muted);margin:0 0 4px;}
.receipt-total{font-size:34px;font-weight:700;color:var(--cream);margin:0;direction:ltr;text-align:right;}
.app-root.ltr .receipt-total{text-align:left;}
.receipt-total.income{color:var(--green);}
.receipt-divider{border-top:1px dashed var(--line);margin:16px 0 14px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-row:last-child{margin-bottom:0;}
.cat-label{font-size:13px;width:64px;flex-shrink:0;}
.cat-track{flex:1;height:7px;background:rgba(242,236,221,0.08);border-radius:4px;overflow:hidden;}
.cat-fill{height:100%;border-radius:4px;}
.cat-amount{font-size:12px;width:76px;text-align:left;flex-shrink:0;direction:ltr;}
.cat-budget-bar{flex:1;height:7px;background:rgba(242,236,221,0.08);border-radius:4px;overflow:hidden;position:relative;}
.cat-budget-fill{height:100%;border-radius:4px;}
.cat-budget-fill.over{background:var(--red)!important;}
.receipt-empty{font-size:13px;color:var(--muted);text-align:center;padding:6px 0 2px;}
.ticket-edge{height:14px;background-image:linear-gradient(45deg,var(--bg-card) 50%,transparent 50%),linear-gradient(-45deg,var(--bg-card) 50%,transparent 50%);background-size:16px 16px;background-position:0 0,0 0;background-repeat:repeat-x;}
.search-wrap{padding:14px 18px 0;}
.search-input{width:100%;background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--cream);font-family:inherit;}
.search-input::placeholder{color:var(--muted);}
.insights-wrap{padding:14px 18px 0;}
.insight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.insight-card{background:var(--bg-card);border-radius:12px;padding:12px 14px;}
.insight-card .i-label{font-size:11px;color:var(--muted);margin:0 0 4px;}
.insight-card .i-value{font-size:16px;font-weight:700;margin:0;direction:ltr;text-align:right;}
.app-root.ltr .insight-card .i-value{text-align:left;}
.carry-card{background:var(--bg-card);border-radius:12px;padding:12px 14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);}
.top-card{background:var(--bg-card);border-radius:12px;padding:12px 14px;margin-top:10px;}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--line);}
.top-row:last-child{border-bottom:none;}
.top-row span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-row .mono{color:var(--copper);font-weight:700;flex-shrink:0;}
.list-controls{display:flex;gap:8px;padding:16px 18px 0;}
.mini-select{flex:1;background:var(--bg-card);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:12.5px;color:var(--cream);font-family:inherit;}
.day-group{padding:18px 18px 0;}
.day-heading{font-size:12.5px;color:var(--muted);font-weight:700;margin:0 0 8px;}
.row{display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line);cursor:pointer;animation:rowIn .18s ease-out;}
@keyframes rowIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion:reduce){.row{animation:none;}}
.row-icon{font-size:19px;width:32px;height:32px;background:rgba(242,236,221,0.06);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.row-main{flex:1;min-width:0;}
.row-cat{font-size:14px;font-weight:500;}
.row-note{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-recur{font-size:10px;color:var(--gold);margin-right:4px;}
.row-amount{font-size:14.5px;font-weight:700;color:var(--copper);direction:ltr;flex-shrink:0;}
.row-amount.income{color:var(--green);}
.empty-state{text-align:center;padding:50px 30px;color:var(--muted);font-size:14px;line-height:1.7;}
.fab{position:fixed;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--copper);color:#1C1209;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.4);cursor:pointer;font-size:28px;font-family:inherit;line-height:1;transition:transform .12s;}
.app-root.rtl .fab{left:24px;}
.app-root.ltr .fab{right:24px;}
.fab:active{transform:scale(0.92);}
.fab:focus-visible{outline:3px solid var(--gold);outline-offset:3px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.sheet{width:100%;max-width:480px;background:var(--bg-card);border-radius:22px 22px 0 0;padding:22px 20px 28px;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease-out;}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media (prefers-reduced-motion:reduce){.sheet{animation:none;}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.sheet-title{font-size:17px;font-weight:700;margin:0;}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:20px;font-family:inherit;}
.close-btn:focus-visible{outline:2px solid var(--gold);border-radius:6px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px;}
.amount-input-wrap{position:relative;}
.amount-input{width:100%;background:var(--bg-deep);border:1px solid var(--line);border-radius:12px;padding:14px 50px 14px 14px;font-size:22px;font-weight:700;color:var(--cream);direction:ltr;text-align:right;font-family:'Space Mono',monospace;}
.app-root.ltr .amount-input{padding:14px 14px 14px 50px;text-align:left;}
.amount-suffix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:14px;font-weight:700;}
.app-root.ltr .amount-suffix{left:auto;right:14px;}
.text-input,.date-input,.select-input,.number-input{width:100%;background:var(--bg-deep);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--cream);font-family:inherit;}
.text-input::placeholder,.number-input::placeholder{color:var(--muted);}
.text-input:focus-visible,.date-input:focus-visible,.amount-input:focus-visible,.select-input:focus-visible,.number-input:focus-visible{outline:2px solid var(--gold);}
.type-toggle{display:flex;gap:8px;}
.type-toggle button{flex:1;background:var(--bg-deep);border:1.5px solid var(--line);color:var(--cream);border-radius:12px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.type-toggle button.active.expense{border-color:var(--copper);background:rgba(201,122,74,0.16);color:var(--copper);}
.type-toggle button.active.income{border-color:var(--green);background:rgba(111,169,138,0.16);color:var(--green);}
.cat-grid-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.edit-link{background:none;border:none;color:var(--muted);font-size:11.5px;text-decoration:underline;cursor:pointer;font-family:inherit;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cat-btn{position:relative;background:var(--bg-deep);border:1.5px solid var(--line);border-radius:12px;padding:10px 4px;color:var(--cream);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;font-size:11.5px;}
.cat-btn .emoji{font-size:18px;}
.cat-btn.active{border-color:var(--copper);background:rgba(201,122,74,0.16);}
.cat-btn:focus-visible{outline:2px solid var(--gold);}
.cat-del-badge{position:absolute;top:-6px;left:-6px;width:20px;height:20px;border-radius:50%;background:#C75C4A;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--bg-card);}
.cat-add-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1.5px dashed var(--line);background:transparent;color:var(--gold);border-radius:12px;padding:10px 4px;cursor:pointer;font-family:inherit;font-size:11.5px;}
.add-cat-panel{background:var(--bg-deep);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:8px;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.emoji-pick{width:36px;height:36px;border-radius:8px;background:rgba(242,236,221,0.06);border:1.5px solid transparent;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.emoji-pick.active{border-color:var(--copper);background:rgba(201,122,74,0.18);}
.panel-actions{display:flex;gap:8px;margin-top:6px;}
.panel-btn-primary{flex:1;background:var(--copper);color:#1C1209;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.panel-btn-secondary{flex:1;background:none;border:1px solid var(--line);color:var(--cream);border-radius:10px;padding:10px;font-size:13px;cursor:pointer;font-family:inherit;}
.error-text{color:#E0897A;font-size:12.5px;margin:-4px 0 14px;}
.save-btn{width:100%;background:var(--copper);color:#1C1209;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.save-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
.delete-btn{width:100%;background:none;border:1px solid rgba(224,137,122,0.4);color:#E0897A;border-radius:12px;padding:12px;font-size:13.5px;cursor:pointer;margin-top:10px;font-family:inherit;}
.checkbox-row{display:flex;align-items:center;gap:8px;}
.checkbox-row input{width:18px;height:18px;accent-color:var(--copper);}
.checkbox-row label{margin:0;font-size:13px;color:var(--cream);}
.recur-fields{margin-top:10px;padding:10px;background:var(--bg-deep);border-radius:10px;border:1px solid var(--line);}
.section-title{font-size:15px;font-weight:700;padding:18px 18px 8px;margin:0;}
.budget-card{background:var(--bg-card);border-radius:14px;padding:14px 16px;margin:0 18px 12px;}
.budget-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.budget-cat-name{font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:6px;}
.budget-amounts{font-size:12px;color:var(--muted);direction:ltr;}
.budget-amounts b{color:var(--cream);font-weight:700;}
.budget-input-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.budget-input-row input{flex:1;}
.chart-card{background:var(--bg-card);border-radius:14px;padding:18px;margin:0 18px 16px;}
.chart-empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:140px;padding-top:10px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;min-height:3px;transition:height .25s;}
.bar-label{font-size:9.5px;color:var(--muted);}
.export-row{display:flex;gap:10px;padding:4px 18px 18px;}
.export-row button{flex:1;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:13px 22px;border-radius:16px;font-size:13.5px;font-weight:700;box-shadow:0 6px 22px rgba(224,137,122,.45);z-index:100;animation:toastPulse .35s ease-out;border:1px solid rgba(255,255,255,.25);max-width:88%;text-align:center;line-height:1.5;}
.toast.info{background:var(--bg-card);color:var(--cream);font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.4);border:1px solid var(--line);}
.toast.undo{background:var(--bg-card);color:var(--cream);font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.4);border:1px solid var(--line);display:flex;align-items:center;gap:14px;}
.toast-undo{background:var(--copper);color:#1C1209;border:none;border-radius:10px;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
@keyframes toastPulse{0%{opacity:0;transform:translate(-50%,10px) scale(.92);}60%{opacity:1;transform:translate(-50%,-2px) scale(1.03);}100%{opacity:1;transform:translate(-50%,0) scale(1);}}
.hidden-file{display:none;}
</style>
</head>

  function dayLabel(dateStr){
    var now=new Date();
    var todayS = dStr(now);
    var y=new Date(now); y.setDate(y.getDate()-1);
    var yest = dStr(y);
    if(dateStr===todayS) return t("today");
    if(dateStr===yest) return t("yesterday");
    var parts = dateStr.split("-").map(Number);
    var suffix = parts[0]!==now.getFullYear() ? " "+parts[0] : "";
    return parts[2]+" "+MONTHS()[parts[1]-1]+suffix;
  }
  function weekRangeLabel(startDt,endDt){
    var months = MONTHS();
    var sm=months[startDt.getMonth()], em=months[endDt.getMonth()];
    if(startDt.getMonth()===endDt.getMonth()) return startDt.getDate()+" - "+endDt.getDate()+" "+em;
    return startDt.getDate()+" "+sm+" - "+endDt.getDate()+" "+em;
  }

  // ---- recurring engine ----
  function applyRecurring(){
    if(!state.recurring.length) return;
    var todayD = todayStr();
    var changed = false;
    state.recurring.forEach(function(r){
      var last = r.lastApplied || r.startDate;
      var cursor = new Date(last);
      var guard = 0;
      while(guard++ < 36){
        var next = new Date(cursor);
        if(r.interval==="monthly") next.setMonth(next.getMonth()+1);
        else if(r.interval==="weekly") next.setDate(next.getDate()+7);
        else next.setFullYear(next.getFullYear()+1);
        var nextStr = dStr(next);
        if(nextStr > todayD) break;
        var cat = catInfo(r.categoryId, r.type==="income"?state.incomeCategories:state.categories) || (r.type==="income"?state.incomeCategories[0]:state.categories[0]);
        state.expenses = [{
          id:newId(), amount:r.amount, categoryId:cat.id, categoryLabel:cat.label, categoryIcon:cat.icon,
          note:r.note||"", date:nextStr, type:r.type||"expense", recurringId:r.id
        }].concat(state.expenses);
        r.lastApplied = nextStr;
        cursor = next;
        changed = true;
      }
    });
    if(changed){ saveExpenses(); saveRecurring(); }
  }

  function applySearch(list){
    var q = (state.searchQuery||"").trim().toLowerCase();
    var out = list;
    if(q){
      out = out.filter(function(e){
        return (e.note||"").toLowerCase().indexOf(q)>=0 || (e.categoryLabel||"").toLowerCase().indexOf(q)>=0;
      });
    }
    if(state.filterCat && state.filterCat!=="all"){
      out = out.filter(function(e){ return e.categoryId===state.filterCat; });
    }
    return out;
  }
  function byCategory(list){
    var map = {};
    list.forEach(function(e){
      if(!map[e.categoryId]) map[e.categoryId] = {id:e.categoryId,label:e.categoryLabel,icon:e.categoryIcon,amount:0};
      map[e.categoryId].amount += Number(e.amount||0);
    });
    var arr = Object.values(map);
    arr.sort(function(a,b){ return b.amount-a.amount; });
    var max = arr.length ? arr[0].amount : 1;
    arr.forEach(function(row,i){ row.pct = Math.max(6, Math.round(row.amount/max*100)); row.color = ACCENTS[i%ACCENTS.length]; });
    return arr;
  }
  function groupByDay(list){
    var map = {};
    list.forEach(function(e){ (map[e.date] = map[e.date]||[]).push(e); });
    var days = Object.keys(map).sort(function(a,b){ return a<b?1:-1; });
    days.forEach(function(d){ map[d].sort(function(a,b){ return a.id<b.id?1:-1; }); });
    return days.map(function(d){ return {date:d, items:map[d]}; });
  }

  function saveExpense(){
    syncDraft();

    if(!amt || amt<=0){ state.error=t("errAmount"); render(); return; }
    if(!state.draftDate){ state.error=t("errDate"); render(); return; }
    var cats = state.form.type==="income" ? state.incomeCategories : state.categories;
    var cat = catInfo(state.form.categoryId, cats) || cats[0];
    var entry = {
      id: state.form.id || newId(),
      amount: amt,
      categoryId: cat.id,
      categoryLabel: cat.label,
      categoryIcon: cat.icon,
      note: (state.draftNote||"").trim(),
      date: state.draftDate,
      type: state.form.type||"expense"
    };
    if(state.form.id){
      var old = state.expenses.find(function(x){return x.id===entry.id;});
      if(old && old.recurringId) entry.recurringId = old.recurringId;
      state.expenses = state.expenses.map(function(e){ return e.id===entry.id ? entry : e; });

        state.recurring.push({

          interval: state.draftRecurInterval, startDate: entry.date, lastApplied: entry.date
        });
        saveRecurring();
      }
    }
    saveExpenses();
    var keep = state.keepOpen && !state.form.id;
    state.keepOpen = false;
    if(keep){
      // reset for a fast next entry, keep modal open
      state.form = {id:null, categoryId: state.form.categoryId, type: state.form.type};
      state.draftAmount=""; state.draftNote=""; state.error="";
      showToast(t("save")+" ✓", "info");
    }else{
      state.showModal=false;
    }
    render();
    checkBudgetAlert(cat.id, entry.type);
    checkWeeklyCapAlert();

  function duplicateExpense(){
    if(!state.form.id) return;
    var src = state.expenses.find(function(x){return x.id===state.form.id;});
    if(!src) return;
    var copy = {
      id:newId(), amount:src.amount, categoryId:src.categoryId, categoryLabel:src.categoryLabel,
      categoryIcon:src.categoryIcon, note:src.note||"", date: todayStr(), type:src.type||"expense"
    };
    state.expenses = [copy].concat(state.expenses);
    saveExpenses();
    state.showModal=false;
    render();

    checkWeeklyCapAlert();

  function deleteExpense(id){
    var idx = state.expenses.findIndex(function(e){ return e.id===id; });
    if(idx<0) return;
    state.lastDeleted = { item: state.expenses[idx], index: idx };
    state.expenses = state.expenses.filter(function(e){ return e.id!==id; });
    saveExpenses();
    state.showModal=false;
    render();
    showToast(t("opDeleted"), "undo");
  }
  function undoDelete(){
    if(!state.lastDeleted) return;
    var d = state.lastDeleted;
    state.expenses.splice(Math.min(d.index, state.expenses.length), 0, d.item);
    state.lastDeleted = null;
    saveExpenses();

  // ---- budgets ----
  function checkBudgetAlert(catId, type){
    if(type!=="expense") return;
    var b = state.budgets[catId];
    if(!b) return;
    var list = monthExpenses(state.viewYear, state.viewMonth).filter(function(e){ return (e.type||"expense")==="expense" && e.categoryId===catId; });
    var total = list.reduce(function(s,e){ return s+Number(e.amount||0); },0);
    if(total > b){
      var cat = catInfo(catId, state.categories);
      showToast(t("budgetExceeded")+" «"+(cat?cat.label:"")+"» "+t("budgetThisMonth")+" ("+formatDZD(total)+" / "+formatDZD(b)+")", "alert");
      if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
    }
  }
  function setBudget(catId, val){
    var n = parseFloat(val);
    if(!n || n<=0) delete state.budgets[catId];
    else state.budgets[catId] = n;
    saveBudgets();
    render();
  }
  function setWeeklyCap(val){
    var n = parseFloat(val);
    state.weeklyCap = (n && n>0) ? n : 0;
    saveWeeklyCap();
    render();
  }
  function currentWeekExpenseTotal(){
    var now=new Date();
    var wkStart = dayOfWeekStart(now);
    var wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate()+6);
    var wkStartStr = dStr(wkStart), wkEndStr = dStr(wkEnd);
    return state.expenses.filter(function(e){ return (e.type||"expense")==="expense" && e.date>=wkStartStr && e.date<=wkEndStr; })
      .reduce(function(s,e){ return s+Number(e.amount||0); },0);
  }
  function checkWeeklyCapAlert(){
    if(!state.weeklyCap || state.weeklyCap<=0) return;
    var total = currentWeekExpenseTotal();
    if(total > state.weeklyCap){
      showToast(t("weeklyCapExceeded")+" ("+formatDZD(total)+" / "+formatDZD(state.weeklyCap)+")", "alert");
      if(navigator.vibrate){ try{ navigator.vibrate([60,40,60,40,60]); }catch(e){} }
    }
  }

  function todayExpenseTotal(){
    var ts = todayStr();
    return state.expenses.filter(function(e){ return (e.type||"expense")==="expense" && e.date===ts; })
      .reduce(function(s,e){ return s+Number(e.amount||0); },0);
  }
  // Carry-over: net balance (income - expenses) accumulated up to the END of the previous month.
  function carryOverInto(y,m){
    var cutoff = y+"-"+pad(m)+"-01"; // first day of viewed month
    var net = 0;
    state.expenses.forEach(function(e){
      if((e.date||"") < cutoff){
        net += (e.type==="income" ? 1 : -1) * Number(e.amount||0);
      }
    });
    return net;
  }
  // Daily average + end-of-month projection for the viewed month.
  function monthAvgAndProjection(){
    var list = monthExpenses(state.viewYear, state.viewMonth).filter(function(e){ return (e.type||"expense")==="expense"; });
    var total = list.reduce(function(s,e){ return s+Number(e.amount||0); },0);
    var now = new Date();
    var isCurrent = state.viewYear===now.getFullYear() && state.viewMonth===now.getMonth()+1;
    var totalDays = new Date(state.viewYear, state.viewMonth, 0).getDate();
    var elapsed = isCurrent ? now.getDate() : totalDays;
    var avg = elapsed>0 ? total/elapsed : 0;
    var projection = isCurrent ? avg*totalDays : total;
    return { avg: avg, projection: projection, isCurrent: isCurrent };
  }
  // Count of days in the viewed month with zero expenses (only counts elapsed days for current month).
  function noSpendDaysCount(){
    var now = new Date();
    var isCurrent = state.viewYear===now.getFullYear() && state.viewMonth===now.getMonth()+1;
    var totalDays = new Date(state.viewYear, state.viewMonth, 0).getDate();
    var upto = isCurrent ? now.getDate() : totalDays;
    var spentDays = {};
    monthExpenses(state.viewYear, state.viewMonth).forEach(function(e){
      if((e.type||"expense")==="expense"){
        var d = Number((e.date||"").split("-")[2]);
        if(d>=1 && d<=upto) spentDays[d]=true;
      }
    });
    var count=0;
    for(var d=1; d<=upto; d++){ if(!spentDays[d]) count++; }
    return count;
  }
  function topExpenses(n){
    var list = monthExpenses(state.viewYear, state.viewMonth).filter(function(e){ return (e.type||"expense")==="expense"; });
    list.sort(function(a,b){ return Number(b.amount)-Number(a.amount); });
    return list.slice(0, n||3);
  }

  // ---- export / import ----
  function exportCSV(){
    var rows = [[t("csvDate"),t("csvType"),t("csvCategory"),t("csvAmount"),t("csvNote")]];
    state.expenses.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
      rows.push([e.date, (e.type==="income"?t("income"):t("expense")), e.categoryLabel, e.amount, (e.note||"").replace(/[\r\n,]/g," ")]);
    });
    var csv = "\uFEFF"+rows.map(function(r){ return r.join(","); }).join("\r\n");
    var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = t("csvFileName");
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast(t("csvExported"), "info");
  }
  function exportJSON(){
    var data = {
      expenses: state.expenses, categories: state.categories, incomeCategories: state.incomeCategories,
      recurring: state.recurring, budgets: state.budgets, weeklyCap: state.weeklyCap, exportedAt: new Date().toISOString()
    };
    var blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = t("jsonFileName");
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    showToast(t("backupCreated"), "info");
  }
  function importJSON(file){
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(!confirm(t("confirmImport"))) return;
        state.expenses = Array.isArray(data.expenses) ? data.expenses : [];
        state.categories = Array.isArray(data.categories) && data.categories.length ? data.categories : DEFAULT_CATEGORIES_BY_LANG[state.lang].slice();
        state.incomeCategories = Array.isArray(data.incomeCategories) && data.incomeCategories.length ? data.incomeCategories : DEFAULT_INCOME_CATEGORIES_BY_LANG[state.lang].slice();
        state.recurring = Array.isArray(data.recurring) ? data.recurring : [];
        state.budgets = (data.budgets && typeof data.budgets==="object") ? data.budgets : {};
        state.weeklyCap = (parseFloat(data.weeklyCap)>0) ? parseFloat(data.weeklyCap) : 0;
        saveExpenses(); saveCategories(); saveIncomeCategories(); saveRecurring(); saveBudgets(); saveWeeklyCap();
        showToast(t("backupImported"), "info");
        render();
      }catch(e){ alert(t("invalidFile")); }
    };
    reader.readAsText(file);
  }

    if(cats.length && total>0){
      var acc=0, stops=[];
      cats.forEach(function(row){
        var startPct = acc/total*100;
        acc += row.amount;
        var endPct = acc/total*100;
        stops.push(row.color+" "+startPct.toFixed(2)+"% "+endPct.toFixed(2)+"%");
      });
      pie = '<div style="width:170px;height:170px;border-radius:50%;margin:0 auto;background:conic-gradient('+stops.join(",")+')"></div>';
    }
    var legend = cats.map(function(row){
      return '<div class="legend-item"><span class="legend-dot" style="background:'+row.color+'"></span>'+esc(row.icon)+' '+esc(row.label)+' · '+formatDZD(row.amount)+'</div>';
    }).join("");

    var months = [];
    for(var i=5;i>=0;i--){
      var mm = addMonths(state.viewYear, state.viewMonth, -i);
      var ml = monthExpenses(mm.y, mm.m).filter(function(e){ return (e.type||"expense")==="expense"; });
      months.push({ y:mm.y, m:mm.m, total: ml.reduce(function(s,e){return s+Number(e.amount||0);},0) });
    }
    var maxBar = Math.max.apply(null, months.map(function(x){return x.total;}).concat([1]));
    var bars = months.map(function(x){
      var h = Math.max(3, Math.round(x.total/maxBar*100));
      var isCur = x.y===state.viewYear && x.m===state.viewMonth;
      return '<div class="bar-col"><div class="bar-fill" style="height:'+h+'%;background:'+(isCur?'var(--copper)':'rgba(242,236,221,0.18)')+'"></div>'
        + '<span class="bar-label">'+MONTHS()[x.m-1].slice(0,3)+'</span></div>';
    }).join("");

    return '<p class="section-title">'+t("distribTitle")+' — '+MONTHS()[state.viewMonth-1]+' '+state.viewYear+'</p>'
      + '<div class="chart-card">'
      + (cats.length ? pie+'<div class="legend">'+legend+'</div>' : '<p class="chart-empty">'+t("noChartData")+'</p>')
      + '</div>'
      + '<p class="section-title">'+t("last6Months")+'</p>'
      + '<div class="chart-card"><div class="bar-chart">'+bars+'</div></div>'
      + '<div class="export-row">'
      + '<button type="button" class="panel-btn-primary" data-act="export-csv">'+t("exportCSV")+'</button>'
      + '<button type="button" class="panel-btn-secondary" data-act="export-json">'+t("exportJSON")+'</button>'
      + '</div>'
      + '<div class="export-row" style="padding-top:0;">'
      + '<button type="button" class="panel-btn-secondary" data-act="trigger-import">'+t("importJSON")+'</button>'
      + '</div>'
      + '<input type="file" id="importFile" class="hidden-file" accept="application/json" />';
  }

  // ---- render: budgets screen ----
  function renderBudgetsScreen(){
    var weekTotal = currentWeekExpenseTotal();
    var capPct = state.weeklyCap>0 ? Math.min(100, Math.round(weekTotal/state.weeklyCap*100)) : 0;
    var capOver = state.weeklyCap>0 && weekTotal>state.weeklyCap;
    var weeklyCard = '<p class="section-title">'+t("weeklyCapTitle")+'</p>'
      + '<div class="budget-card">'
      + '<div class="budget-head"><span class="budget-cat-name">📅 '+t("thisWeek")+'</span>'
      + '<span class="budget-amounts mono">'+(state.weeklyCap>0 ? formatDZD(weekTotal)+' / '+formatDZD(state.weeklyCap) : formatDZD(weekTotal))+'</span></div>'
      + (state.weeklyCap>0 ? '<div class="cat-budget-bar"><div class="cat-budget-fill'+(capOver?' over':'')+'" style="width:'+capPct+'%;background:'+(capOver?'':'var(--copper)')+'"></div></div>' : '')
      + '<div class="budget-input-row"><input type="number" inputmode="decimal" class="number-input" placeholder="'+t("weeklyCapPlaceholder")+'" value="'+(state.weeklyCap>0?state.weeklyCap:'')+'" data-act="set-weekly-cap" /></div>'
      + '</div>';

    var list = monthExpenses(state.viewYear, state.viewMonth).filter(function(e){ return (e.type||"expense")==="expense"; });
    var spentByCat = {};
    list.forEach(function(e){ spentByCat[e.categoryId] = (spentByCat[e.categoryId]||0) + Number(e.amount||0); });
    var cards = state.categories.map(function(c){
      var spent = spentByCat[c.id]||0;
      var budget = state.budgets[c.id]||0;
      var pct = budget>0 ? Math.min(100, Math.round(spent/budget*100)) : 0;
      var over = budget>0 && spent>budget;
      return '<div class="budget-card">'
        + '<div class="budget-head"><span class="budget-cat-name">'+esc(c.icon)+' '+esc(c.label)+'</span>'
        + '<span class="budget-amounts mono">'+(budget>0 ? formatDZD(spent)+' / '+formatDZD(budget) : formatDZD(spent))+'</span></div>'
        + (budget>0 ? '<div class="cat-budget-bar"><div class="cat-budget-fill'+(over?' over':'')+'" style="width:'+pct+'%;background:'+(over?'':'var(--copper)')+'"></div></div>' : '')
        + '<div class="budget-input-row"><input type="number" inputmode="decimal" class="number-input" placeholder="'+t("setBudgetPlaceholder")+'" value="'+(budget>0?budget:'')+'" data-act="set-budget" data-id="'+c.id+'" /></div>'
        + '</div>';
    }).join("");
    return weeklyCard + '<p class="section-title">'+t("monthlyBudgets")+'</p>'+cards;
  }

  function renderApp(){
    var dirClass = t("dir")==="rtl" ? "rtl" : "ltr";
    if(!state.loaded) return '<div class="app-root '+dirClass+'"><p style="text-align:center;color:var(--muted);padding:60px 0;">'+t("loading")+'</p></div>';
    var now=new Date();
    var isCurrentRealMonth = state.viewYear===now.getFullYear() && state.viewMonth===now.getMonth()+1;

    var body = "";
    if(state.screen==="home"){
      body = renderStatChips()
        + '<div class="month-nav">'
        + '<button type="button" class="nav-btn" data-act="prev-month" aria-label="prev">‹</button>'
        + '<div class="month-label">'+MONTHS()[state.viewMonth-1]+' '+state.viewYear+'</div>'
        + '<button type="button" class="nav-btn" data-act="next-month" aria-label="next"'+(isCurrentRealMonth?' disabled':'')+'>›</button>'
        + '</div>'
        + '<div class="search-wrap"><input type="text" class="search-input" placeholder="'+t("searchPlaceholder")+'" value="'+esc(state.searchQuery)+'" data-act="search-input" /></div>'
        + renderInsights()
        + renderReceipt()
        + renderListControls()
        + renderList();
    } else if(state.screen==="stats"){
      body = '<div class="month-nav">'
        + '<button type="button" class="nav-btn" data-act="prev-month" aria-label="prev">‹</button>'
        + '<div class="month-label">'+MONTHS()[state.viewMonth-1]+' '+state.viewYear+'</div>'
        + '<button type="button" class="nav-btn" data-act="next-month" aria-label="next"'+(isCurrentRealMonth?' disabled':'')+'>›</button>'
        + '</div>'
        + renderStatsScreen();
    } else if(state.screen==="budgets"){
      body = renderBudgetsScreen();
    }

    return '<div class="app-root '+dirClass+'">'
      + '<div class="header"><div><h1>'+t("appTitle")+'</h1><p class="subtitle">'+t("subtitle")+'</p></div>'
      + '<div class="header-actions">'
      + '<button type="button" class="icon-btn" data-act="toggle-lang" aria-label="lang">'+t("langBtn")+'</button>'
      + '<button type="button" class="icon-btn" data-act="toggle-theme" aria-label="theme">'+(state.theme==="dark"?"☀️":"🌙")+'</button>'
      + (state.expenses.length ? '<button type="button" class="reset-link" data-act="reset-all">'+t("reset")+'</button>' : '')
      + '</div></div>'
      + '<div class="tab-row">'
      + '<button type="button" class="tab-btn'+(state.screen==="home"?' active':'')+'" data-act="set-screen" data-screen="home">'+t("tabHome")+'</button>'
      + '<button type="button" class="tab-btn'+(state.screen==="stats"?' active':'')+'" data-act="set-screen" data-screen="stats">'+t("tabStats")+'</button>'
      + '<button type="button" class="tab-btn'+(state.screen==="budgets"?' active':'')+'" data-act="set-screen" data-screen="budgets">'+t("tabBudgets")+'</button>'
      + '</div>'
      + body
      + '<button type="button" class="fab" data-act="open-add" aria-label="add">+</button>'
      + renderModal()
      + (state.toast ? '<div class="toast'+(state.toastType==="alert"?'':(state.toastType==="undo"?' undo':' info'))+'">'+esc(state.toast)+(state.toastType==="undo"?'<button type="button" class="toast-undo" data-act="undo-delete">'+t("undo")+'</button>':'')+'</div>' : '')
      + '</div>';
  }

  function render(){
    syncDraft();
    document.getElementById("app").innerHTML = renderApp();
    var imp = document.getElementById("importFile");
    if(imp){ imp.addEventListener("change", function(ev){ if(ev.target.files[0]) importJSON(ev.target.files[0]); }); }
  }

  // ---- event delegation ----
  document.addEventListener("click", function(e){
    if(e.target && e.target.id==="overlay"){ closeModal(); return; }
    var el = e.target.closest("[data-act]");
    if(!el) return;
    var act = el.getAttribute("data-act");
    var id = el.getAttribute("data-id");
    switch(act){
      case "prev-month": prevMonth(); break;
      case "next-month": nextMonth(); break;
      case "open-add": openAdd("expense"); break;
      case "open-edit":
        var exp = state.expenses.find(function(x){ return x.id===id; });
        if(exp) openEdit(exp);
        break;
      case "close-modal": closeModal(); break;
      case "select-cat": selectCat(id); break;
      case "toggle-cat-edit": toggleCatEdit(); break;
      case "delete-cat": deleteCat(id); break;
      case "open-add-cat": openAddCatPanel(); break;
      case "cancel-add-cat": cancelAddCat(); break;
      case "pick-emoji": pickEmoji(el.getAttribute("data-emoji")); break;
      case "confirm-add-cat": syncDraft(); confirmAddCat(); break;
      case "save-expense": saveExpense(); break;
      case "save-and-next": saveExpenseAndNext(); break;
      case "duplicate-expense": duplicateExpense(); break;
      case "undo-delete": undoDelete(); break;
      case "delete-expense": deleteExpense(id); break;
      case "reset-all": resetAll(); break;
      case "set-type": setFormType(el.getAttribute("data-type")); break;
      case "toggle-theme": toggleTheme(); break;
      case "toggle-lang": toggleLang(); break;
      case "set-screen": setScreen(el.getAttribute("data-screen")); break;
      case "toggle-recur": state.draftRecurring=!state.draftRecurring; render(); break;
      case "export-csv": exportCSV(); break;
      case "export-json": exportJSON(); break;
      case "trigger-import": document.getElementById("importFile").click(); break;
    }
  });
  document.addEventListener("change", function(e){
    var el = e.target.closest("[data-act]");
    if(!el) return;
    var act = el.getAttribute("data-act");
    if(act==="set-recur-interval"){ state.draftRecurInterval = el.value; render(); }
    if(act==="set-budget"){ setBudget(el.getAttribute("data-id"), el.value); }
    if(act==="set-weekly-cap"){ setWeeklyCap(el.value); }
    if(act==="set-sort"){ state.sortMode = el.value; render(); }
    if(act==="set-filter"){ state.filterCat = el.value; render(); }
  });
  document.addEventListener("input", function(e){
    var el = e.target.closest("[data-act]");
    if(!el) return;
    var act = el.getAttribute("data-act");
    if(act==="search-input"){ state.searchQuery = el.value; render(); var si=document.querySelector('[data-act="search-input"]'); if(si){ si.focus(); si.setSelectionRange(si.value.length, si.value.length);} }
  });

  loadAll();
  render();

  // ---- service worker (offline) ----
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
